[project]

# Unique identifier of the project.
name = "argivo"

# Current semantic version of the project.
version = "0.1.0"

# Short one-line summary shown in help messages,
# package listings and project metadata.
description = "Declarative command-line framework for Bash scripts."

# Extended project description displayed by commands
# such as "argivo --help" and other documentation tools.
about = """
Argivo is a lightweight framework that turns Bash functions
into structured command-line interfaces.

It provides automatic help generation, argument parsing,
metadata annotations and command discovery.
"""